<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6a00"/>
      <stop offset="50%" stop-color="#ffd200"/>
      <stop offset="100%" stop-color="#ff2d78"/>
    </linearGradient>
    <linearGradient id="symbol" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo circular -->
  <circle cx="128" cy="128" r="128" fill="url(#bg)"/>

  <!-- Anel gradiente externo -->
  <circle cx="128" cy="128" r="120" fill="none" stroke="url(#ring)" stroke-width="8" opacity="0.9"/>

  <!-- Anel interno mais fino -->
  <circle cx="128" cy="128" r="105" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.4"/>

  <!-- Símbolo ₿ centralizado -->
  <text
    x="128"
    y="155"
    font-family="Arial, sans-serif"
    font-size="110"
    font-weight="900"
    text-anchor="middle"
    fill="url(#symbol)"
    filter="url(#glow)"
  >₿</text>

  <!-- Texto BITI embaixo -->
  <text
    x="128"
    y="210"
    font-family="Arial, sans-serif"
    font-size="28"
    font-weight="700"
    text-anchor="middle"
    letter-spacing="8"
    fill="#ffd200"
    opacity="0.9"
  >BITI</text>
</svg>
